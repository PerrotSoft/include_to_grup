<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NETWORK HUB | Security System</title>
    <style>
        :root {
            --accent: #0078d4;
            --danger: #ff4444;
            --panel: rgba(10, 10, 15, 0.98);
            --border: rgba(255, 255, 255, 0.15);
            --glass: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0; height: 100vh; display: flex;
            background: #020205 url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=2070') no-repeat center;
            background-size: cover; font-family: 'Segoe UI', sans-serif; color: #e0e0e0; overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar { 
            width: 280px; background: var(--panel); backdrop-filter: blur(50px);
            border-right: 2px solid var(--border); display: flex; flex-direction: column; padding: 25px;
        }

        .user-profile {
            background: linear-gradient(135deg, var(--accent), #003e6e);
            width: 50px; height: 50px; border-radius: 12px; margin-bottom: 15px;
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .nav-link { 
            padding: 12px 15px; border-radius: 8px; cursor: pointer; display: flex; align-items: center;
            gap: 12px; margin-bottom: 8px; transition: 0.2s; color: #bbb;
            border: 1px solid transparent; 
        }
        .nav-link:hover { background: var(--glass); color: white; border-color: var(--border); }
        .nav-link.active { background: rgba(0, 120, 212, 0.2); color: white; border-color: var(--accent); box-shadow: 0 0 15px rgba(0,120,212,0.2); }

        /* VIEWPORT */
        .main { flex: 1; position: relative; }
        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .header { padding: 25px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); }
        .content { flex: 1; overflow-y: auto; padding: 30px; }

        /* CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .card { 
            background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 12px; 
            cursor: pointer; transition: 0.3s;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); background: rgba(20, 20, 30, 0.98); }
        .card.mission-card { border-left: 5px solid var(--danger); }
        .card.group-card { border-left: 5px solid var(--accent); }
        .card.intel-card { border-left: 5px solid #00ff88; } 

        /* CHAT & REACTIONS */
        .msg-container { margin-bottom: 20px; display: flex; flex-direction: column; max-width: 85%; }
        
        .react-btn {
            background: var(--glass); border: 1px solid var(--border); padding: 4px 10px; 
            border-radius: 6px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 5px;
        }
        .react-btn:hover { background: rgba(255,255,255,0.15); border-color: white; color: white; }

        /* INPUTS & BTNS */
        input, textarea { 
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--border); 
            padding: 12px; color: white; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box;
        }
        input:focus, textarea:focus { border-color: var(--accent); outline: none; }
        
        .btn { 
            background: var(--accent); color: white; border: 1px solid rgba(255,255,255,0.1); 
            padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: 600; 
            transition: 0.2s;
        }
        .btn:hover { filter: brightness(1.2); transform: translateY(-1px); }

        .user-picker {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-height: 150px; overflow-y: auto;
            background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border);
        }
        .user-opt { padding: 8px; background: var(--glass); border-radius: 5px; font-size: 12px; cursor: pointer; border: 1px solid transparent; }
        .user-opt.selected { border-color: var(--accent); background: rgba(0,120,212,0.2); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal { background: var(--panel); border: 2px solid var(--border); padding: 35px; width: 400px; border-radius: 15px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="user-profile" id="avatar">?</div>
    <div style="margin-bottom: 30px;">
        <div id="u-name" style="font-weight: bold; color: white; letter-spacing: 1px;">AGENT</div>
        <div style="font-size: 10px; color: var(--accent); font-weight: bold;">SECURITY LEVEL: ALPHA</div>
    </div>

    <div class="nav-link active" onclick="nav('intel', this)"><span>📡</span> ИСТОРИИ (КАНАЛЫ)</div>
    <div class="nav-link" onclick="nav('groups', this)"><span>🌐</span> ОБЩИЕ ГРУППЫ</div>
    <div class="nav-link" onclick="nav('missions', this)"><span>⚔️</span> СПЕЦОПЕРАЦИИ</div>
    
    <div style="flex:1"></div>
    <button class="btn" style="background:var(--danger); width: 100%;" onclick="window.location.href='index.html'">ОТКЛЮЧИТЬСЯ</button>
</div>

<div class="main">
    <div id="scr-intel" class="screen">
        <div class="header">
            <h2>INTELLIGENCE_FEED</h2>
            <button onclick="openMod('mod-intel')" class="btn" style="width:auto">+ СОЗДАТЬ КАНАЛ</button>
        </div>
        <div class="content"><div id="intel-grid" class="grid"></div></div>
    </div>

    <div id="scr-groups" class="screen hidden">
        <div class="header">
            <h2>NETWORK_GROUPS</h2>
            <button onclick="openMod('mod-group')" class="btn" style="width:auto">+ СОЗДАТЬ ГРУППУ</button>
        </div>
        <div class="content"><div id="groups-grid" class="grid"></div></div>
    </div>

    <div id="scr-missions" class="screen hidden">
        <div class="header">
            <h2>CLASSIFIED_MISSIONS</h2>
            <button onclick="openMod('mod-mission')" class="btn" style="width:auto; background:var(--danger)">+ НОВАЯ МИССИЯ</button>
        </div>
        <div class="content"><div id="missions-grid" class="grid"></div></div>
    </div>

    <div id="scr-chat" class="screen hidden">
        <div class="header">
            <button onclick="goBack()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-weight:bold;">← НАЗАД</button>
            <h3 id="chat-title">PROJECT_NAME</h3>
            <div id="chat-status-tag" style="font-size:10px; padding:4px 10px; border:1px solid var(--border); border-radius:4px;">STATUS: ACTIVE</div>
        </div>
        <div class="content" id="msg-box" style="display:flex; flex-direction:column;"></div>
        <div id="chat-controls" style="padding:20px; border-top:1px solid var(--border); background: rgba(0,0,0,0.2);">
            <div id="file-previews" style="display:flex; gap:10px; margin-bottom:10px;"></div>
            <div style="display:flex; gap:10px;">
                <label style="background:var(--glass); padding:10px; border:1px solid var(--border); border-radius:8px; cursor:pointer">📎<input type="file" id="files-in" multiple class="hidden"></label>
                <input type="text" id="msg-input" placeholder="Введите сообщение..." style="margin:0">
                <button onclick="sendMsg()" class="btn" style="width:auto">SEND</button>
            </div>
        </div>
    </div>
</div>

<div id="mod-comment" class="modal-overlay hidden">
    <div class="modal">
        <h3>КОММЕНТАРИЙ</h3>
        <textarea id="comm-text" placeholder="Ваш ответ или заметка к сообщению..."></textarea>
        <button class="btn" id="save-comment">ОТПРАВИТЬ</button>
        <button onclick="closeMod()" style="background:none; border:none; color:#777; width:100%; margin-top:10px; cursor:pointer;">ОТМЕНА</button>
    </div>
</div>

<div id="mod-intel" class="modal-overlay hidden">
    <div class="modal">
        <h3>НОВАЯ ИСТОРИЯ (КАНАЛ)</h3>
        <input type="text" id="int-name" placeholder="Название канала">
        <textarea id="int-desc" placeholder="О чем этот канал? (Писать сможете только вы)"></textarea>
        <button class="btn" id="save-intel">ОТКРЫТЬ ВЕЩАНИЕ</button>
        <button onclick="closeMod()" style="background:none; border:none; color:#777; width:100%; margin-top:10px; cursor:pointer;">ОТМЕНА</button>
    </div>
</div>

<div id="mod-group" class="modal-overlay hidden">
    <div class="modal">
        <h3>НОВАЯ ОБЩАЯ ГРУППА</h3>
        <input type="text" id="gr-name" placeholder="Название группы">
        <textarea id="gr-desc" placeholder="Описание группы"></textarea>
        <button class="btn" id="save-group">СОЗДАТЬ</button>
        <button onclick="closeMod()" style="background:none; border:none; color:#777; width:100%; margin-top:10px; cursor:pointer;">ОТМЕНА</button>
    </div>
</div>

<div id="mod-mission" class="modal-overlay hidden">
    <div class="modal">
        <h3>ПАРАМЕТРЫ МИССИИ</h3>
        <input type="text" id="ms-name" placeholder="Кодовое имя">
        <p style="font-size: 11px; color: var(--accent); margin-bottom: 5px; font-weight: bold;">ДОБАВИТЬ ОПЕРАТИВНИКОВ:</p>
        <div id="ms-user-picker" class="user-picker"></div>
        <textarea id="ms-desc" placeholder="Инструкции..."></textarea>
        <button class="btn" style="background:var(--danger)" id="save-mission">АКТИВИРОВАТЬ</button>
        <button onclick="closeMod()" style="background:none; border:none; color:#777; width:100%; margin-top:10px; cursor:pointer;">ОТМЕНА</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCjzPoM1tvSPKkHvSm8WdMvre_IPRX82vg",
        authDomain: "krivan-1f7bd.firebaseapp.com",
        projectId: "krivan-1f7bd",
        databaseURL: "https://krivan-1f7bd-default-rtdb.firebaseio.com",
        storageBucket: "krivan-1f7bd.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const userId = new URLSearchParams(window.location.search).get('id');
    let user = null;
    let activeChatPath = '';
    let currentScreen = 'intel';
    let selectedForMission = [];
    let attachments = [];
    let currentTargetMsg = ''; 

    onValue(ref(db, `users/${userId}`), (s) => {
        user = s.val();
        document.getElementById('avatar').innerText = user.name[0].toUpperCase();
        document.getElementById('u-name').innerText = user.name.toUpperCase();
    });

    window.nav = (id, el) => {
        currentScreen = id;
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(`scr-${id}`).classList.remove('hidden');
        if(el) {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
        }
    };

    window.goBack = () => nav(currentScreen);
    window.openMod = (id) => {
        document.getElementById(id).classList.remove('hidden');
        if(id === 'mod-mission') loadUserPicker();
    };
    window.closeMod = () => document.querySelectorAll('.modal-overlay').forEach(m => m.classList.add('hidden'));

    function loadUserPicker() {
        onValue(ref(db, 'users'), (snap) => {
            const container = document.getElementById('ms-user-picker');
            container.innerHTML = '';
            selectedForMission = [userId];
            snap.forEach(u => {
                if(u.key === userId) return;
                const opt = document.createElement('div');
                opt.className = 'user-opt';
                opt.innerText = u.val().name;
                opt.onclick = () => {
                    opt.classList.toggle('selected');
                    if(opt.classList.contains('selected')) selectedForMission.push(u.key);
                    else selectedForMission = selectedForMission.filter(id => id !== u.key);
                };
                container.appendChild(opt);
            });
        }, { onlyOnce: true });
    }

    // --- СОЗДАНИЕ ОБЪЕКТОВ ---
    document.getElementById('save-intel').onclick = () => {
        push(ref(db, 'hub/intel'), { name: document.getElementById('int-name').value, desc: document.getElementById('int-desc').value, author: user.name, ownerId: userId, type: 'intel' });
        closeMod();
    };

    document.getElementById('save-group').onclick = () => {
        push(ref(db, 'hub/groups'), { name: document.getElementById('gr-name').value, desc: document.getElementById('gr-desc').value, author: user.name, type: 'group' });
        closeMod();
    };

    document.getElementById('save-mission').onclick = () => {
        push(ref(db, 'hub/missions'), { name: document.getElementById('ms-name').value, desc: document.getElementById('ms-desc').value, access: selectedForMission, author: user.name, type: 'mission' });
        closeMod();
    };

    // --- РЕНДЕР СПИСКОВ ---
    const loadList = (path, gridId) => {
        onValue(ref(db, `hub/${path}`), (snap) => {
            const grid = document.getElementById(gridId);
            grid.innerHTML = '';
            snap.forEach(child => {
                const data = child.val();
                if(path === 'missions' && !data.access.includes(userId)) return;

                const card = document.createElement('div');
                card.className = `card ${path}-card`;
                card.innerHTML = `
                    <div style="font-size:10px; color:var(--accent); font-weight:bold; margin-bottom:5px;">${path === 'intel' ? 'CHANNEL BY' : 'BY'}: ${data.author}</div>
                    <h4 style="margin:0 0 10px 0">${data.name}</h4>
                    <p style="font-size:11px; color:#999; margin:0">${data.desc}</p>
                `;
                card.onclick = () => openThread(path, child.key, data);
                grid.appendChild(card);
            });
        });
    };

    loadList('intel', 'intel-grid');
    loadList('groups', 'groups-grid');
    loadList('missions', 'missions-grid');

    // --- ЛОГИКА РЕАКЦИЙ И КОММЕНТАРИЕВ ---
    window.react = (msgKey, type) => {
        const rRef = ref(db, `${activeChatPath}/${msgKey}/reactions/${type}`);
        runTransaction(rRef, (current) => (current || 0) + 1);
    };

    window.openCommentMod = (msgKey) => {
        currentTargetMsg = msgKey;
        openMod('mod-comment');
    };

    document.getElementById('save-comment').onclick = () => {
        const text = document.getElementById('comm-text').value;
        if(!text) return;
        push(ref(db, `${activeChatPath}/${currentTargetMsg}/comments`), {
            user: user.name, text: text, time: Date.now()
        });
        document.getElementById('comm-text').value = '';
        closeMod();
    };

    // --- ЛОГИКА ЧАТА ---
    function openThread(path, id, data) {
        activeChatPath = `hub/${path}/${id}/msgs`;
        document.getElementById('chat-title').innerText = data.name.toUpperCase();
        nav('chat');
        
        const isIntel = path === 'intel';
        const isOwner = data.ownerId === userId;
        document.getElementById('chat-controls').classList.toggle('hidden', isIntel && !isOwner);
        if(isIntel && !isOwner) document.getElementById('chat-status-tag').innerText = "READ ONLY CHANNEL";
        else document.getElementById('chat-status-tag').innerText = "STATUS: ACTIVE";

        onValue(ref(db, activeChatPath), (snap) => {
            const box = document.getElementById('msg-box');
            box.innerHTML = '';
            snap.forEach(mSnap => {
                const m = mSnap.val();
                const mKey = mSnap.key;
                const isMe = m.uid === userId;
                
                const cont = document.createElement('div');
                cont.className = 'msg-container';
                cont.style.alignSelf = isMe ? 'flex-end' : 'flex-start';

                let imgs = '';
                if(m.files) m.files.forEach(f => {
                    if(f.type.includes('image')) imgs += `<img src="${f.data}" style="max-width:300px; border-radius:10px; margin-top:10px; display:block; border:1px solid var(--border)">`;
                    else imgs += `<div style="padding:10px; background:rgba(255,255,255,0.05); font-size:10px; margin-top:5px; border-radius:8px;">📎 ${f.name}</div>`;
                });

                // Рендер комментариев
                let commentsHtml = '';
                if(m.comments) {
                    commentsHtml = `<div style="margin-top:10px; padding-left:15px; border-left:2px solid var(--accent); font-size:11px;">`;
                    Object.values(m.comments).forEach(c => {
                        commentsHtml += `<div style="background:rgba(0,0,0,0.3); padding:8px 12px; border-radius:8px; margin-bottom:5px;"><b>${c.user}:</b> ${c.text}</div>`;
                    });
                    commentsHtml += `</div>`;
                }

                cont.innerHTML = `
                    <div style="font-size:9px; color:var(--accent); margin-bottom:3px; font-weight:bold; text-align:${isMe ? 'right' : 'left'}">${m.user}</div>
                    <div style="padding:12px 18px; background:${isMe ? 'rgba(0,120,212,0.25)' : 'rgba(255,255,255,0.05)'}; border:1px solid ${isMe ? 'var(--accent)' : 'var(--border)'}; border-radius:12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
                        ${m.text}${imgs}
                    </div>
                    <div style="display:flex; gap:8px; margin-top:8px; font-size:11px; justify-content:${isMe ? 'flex-end' : 'flex-start'}">
                        <div class="react-btn" onclick="react('${mKey}', 'like')">👍 ${m.reactions?.like || 0}</div>
                        <div class="react-btn" onclick="react('${mKey}', 'dislike')">👎 ${m.reactions?.dislike || 0}</div>
                        <div class="react-btn" onclick="openCommentMod('${mKey}')">💬 ${m.comments ? Object.keys(m.comments).length : 0}</div>
                    </div>
                    ${commentsHtml}
                `;
                box.appendChild(cont);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    // --- ФАЙЛЫ ---
    document.getElementById('files-in').onchange = (e) => {
        const files = Array.from(e.target.files);
        const prev = document.getElementById('file-previews');
        prev.innerHTML = ''; attachments = [];
        files.forEach(f => {
            const r = new FileReader();
            r.onload = (ev) => {
                attachments.push({ name: f.name, type: f.type, data: ev.target.result });
                const chip = document.createElement('div');
                chip.style = "background:var(--accent); padding:5px 10px; font-size:10px; border-radius:4px; border:1px solid rgba(255,255,255,0.2)";
                chip.innerText = f.name;
                prev.appendChild(chip);
            };
            r.readAsDataURL(f);
        });
    };

    window.sendMsg = () => {
        const text = document.getElementById('msg-input').value;
        if(!text && attachments.length === 0) return;
        push(ref(db, activeChatPath), { uid: userId, user: user.name, text, files: attachments, time: Date.now() });
        document.getElementById('msg-input').value = '';
        document.getElementById('file-previews').innerHTML = '';
        attachments = [];
    };

</script>
</body>
</html>
