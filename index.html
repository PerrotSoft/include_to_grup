<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NETWORK HUB | Access Node</title>
    <link rel="icon" href="https://perrotsoft.github.io/img/ico1.png" type="image/x-icon"> 
    <style>
        :root {
            --accent: #0078d4;
            --danger: #ff4444;
            --mica: rgba(10, 10, 15, 0.95);
            --border: rgba(255, 255, 255, 0.15);
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #020205 url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=2070') no-repeat center;
            background-size: cover;
            font-family: 'Segoe UI Variable', 'Segoe UI', sans-serif;
            color: #e0e0e0;
            overflow: hidden;
        }

        /* ЭФФЕКТ СВЕЧЕНИЯ НА ФОНЕ */
        body::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0, 120, 212, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .window {
            background: var(--mica);
            backdrop-filter: blur(40px) saturate(180%);
            border: 2px solid var(--border);
            border-radius: 16px;
            width: 420px;
            padding: 45px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6), 0 0 20px rgba(0, 120, 212, 0.1);
            text-align: center;
            position: relative;
            animation: windowShow 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes windowShow {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-area {
            width: 90px; height: 90px; margin: 0 auto 30px;
            background: linear-gradient(135deg, var(--accent), #003e6e);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }

        h2 { font-weight: 600; letter-spacing: 2px; color: white; margin-bottom: 25px; font-size: 22px; }

        .input-group { position: relative; margin-bottom: 15px; }

        input, select {
            width: 100%; padding: 14px 16px;
            background: rgba(0,0,0,0.4); 
            border: 1px solid var(--border);
            border-radius: 10px; color: white; box-sizing: border-box;
            transition: 0.2s; font-size: 14px;
        }

        input:focus, select:focus {
            border-color: var(--accent);
            background: rgba(0,0,0,0.6);
            outline: none;
            box-shadow: 0 0 0 4px rgba(0, 120, 212, 0.15);
        }

        button {
            width: 100%; padding: 14px; 
            background: var(--accent);
            color: white; border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 10px;
            font-weight: 700; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1.5px;
            margin-top: 10px; margin-bottom: 15px;
        }

        button:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(0, 120, 212, 0.4);
        }

        button:active { transform: translateY(0); }

        .nav-link { 
            color: #888; font-size: 12px; cursor: pointer; 
            transition: 0.2s; display: inline-block;
            padding: 5px 10px; border-radius: 5px;
        }
        .nav-link:hover { color: var(--accent); background: var(--glass); }

        .hidden { display: none !important; }

        /* Кастомный селект */
        select option { background: #111; color: white; }
    </style>
</head>
<body>

<div class="window" id="mainContainer">
    <div class="logo-area">
        <img src="https://perrotsoft.github.io/img/ico.png" style="width: 60px; height: 60px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));">
    </div>

    <div id="view-login">
        <h2>NODE LOGIN</h2>
        <div class="input-group">
            <input type="text" id="loginId" placeholder="ENTER 16-BIT ACCESS ID">
        </div>
        <button id="btnLogin">ESTABLISH CONNECTION</button>
        <div class="nav-link" id="linkToReg">INITIALIZE NEW IDENTITY</div>
    </div>

    <div id="view-form" class="hidden">
        <h2>IDENTITY GEN</h2>
        <input type="text" id="userName" placeholder="SUBJECT_NAME" style="margin-bottom: 12px;">
        <select id="groupSelect" style="margin-bottom: 12px;">
            <option value="Krivan">Криван</option>
            <option value="ParrotSoft’s Empire">ParrotSoft’s Empire</option>
            <option value="Not Tegs">Not Tegs</option>
        </select>
        <input type="email" id="userEmail" placeholder="AUTH_EMAIL" style="margin-bottom: 12px;">
        <button id="btnRegister" style="background: #008a17;">START PROTOCOL</button>
        <div class="nav-link" id="linkToLogin">BACK TO AUTH</div>
    </div>
</div>

<script type="module">
    const firebaseConfig = {
        apiKey: "AIzaSyCjzPoM1tvSPKkHvSm8WdMvre_IPRX82vg",
        authDomain: "krivan-1f7bd.firebaseapp.com",
        projectId: "krivan-1f7bd",
        databaseURL: "https://krivan-1f7bd-default-rtdb.firebaseio.com",
        storageBucket: "krivan-1f7bd.firebasestorage.app"
    };

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const viewLogin = document.getElementById('view-login');
    const viewForm = document.getElementById('view-form');

    document.getElementById('linkToReg').onclick = () => {
        viewLogin.classList.add('hidden');
        viewForm.classList.remove('hidden');
    };

    document.getElementById('linkToLogin').onclick = () => {
        viewForm.classList.add('hidden');
        viewLogin.classList.remove('hidden');
    };

    document.getElementById('btnLogin').onclick = async () => {
        const inputId = document.getElementById('loginId').value.trim().toUpperCase();
        if(!inputId) return;
        
        const dbRef = ref(db);
        try {
            const snapshot = await get(child(dbRef, `users/${inputId}`));
            if (snapshot.exists()) {
                window.location.href = `chat.html?id=${inputId}`;
            } else {
                alert("ACCESS DENIED: ID NOT FOUND");
            }
        } catch(e) {
            alert("SYSTEM ERROR: UNABLE TO CONNECT");
        }
    };

    document.getElementById('btnRegister').onclick = async () => {
        const name = document.getElementById('userName').value.trim();
        const email = document.getElementById('userEmail').value.trim();
        const group = document.getElementById('groupSelect').value;
        
        if(!name || !email) return alert("MISSING PARAMETERS");

        const h = () => Math.floor(Math.random()*65536).toString(16).toUpperCase().padStart(4, '0');
        const finalID = `${h()}-${h()}-${h()}`;
        
        try {
            await set(ref(db, 'users/' + finalID), {
                id: finalID,
                name: name,
                email: email,
                group: group,
                timestamp: Date.now()
            });
            alert(`NODE INITIALIZED!\nYOUR ID: ${finalID}\nSAVE IT IMMEDIATELY.`);
            window.location.href = `chat.html?id=${finalID}`;
        } catch(e) {
            alert("PROTOCOL FAILED: DATABASE REJECTED");
        }
    };
</script>
</body>
</html>
